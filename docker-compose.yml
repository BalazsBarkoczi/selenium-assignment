services:
  selenium:
    image: selenium/standalone-chrome:latest
    shm_size: "2gb"

  tests:
    build:
      context: .
      args:
        TEST_EMAIL: ${TEST_EMAIL:-}
        TEST_PASSWORD: ${TEST_PASSWORD:-}
    environment:
      SELENIUM_REMOTE_URL: http://selenium:4444
      CHROME_HEADLESS: "true"
      TEST_EMAIL: ${TEST_EMAIL:-}
      TEST_PASSWORD: ${TEST_PASSWORD:-}
    depends_on:
      - selenium
    command: mvn test